<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Live Map Tracker</title>
    <!-- Leaflet CSS + JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1e293b;
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .controls {
            background: #0f172a;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        input, button {
            padding: 8px 16px;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
        }
        button {
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }
        #map {
            height: 500px;
            border-radius: 16px;
            background: #334155;
        }
        .info {
            margin-top: 12px;
            font-size: 14px;
            text-align: center;
        }
        .status-badge {
            display: inline-block;
            background: #10b981;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🗺️ Admin Live Map Tracker</h2>
        <div class="controls">
            <input type="text" id="memberIdInput" placeholder="Member ID (e.g., alex_chen)" value="alex_chen">
            <button id="trackBtn">Track Member</button>
            <span id="liveStatus" class="status-badge">⚪ Not tracking</span>
        </div>
        <div id="map"></div>
        <div class="info" id="info">Enter a member ID and click Track to see live location.</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyDBLGdFzXkQBu4V9AQeO6R7C4LEo3DgAis",
            authDomain: "chaitanya-ab4ae.firebaseapp.com",
            projectId: "chaitanya-ab4ae",
            storageBucket: "chaitanya-ab4ae.firebasestorage.app",
            messagingSenderId: "571927331069",
            appId: "1:571927331069:web:a256783fa948228363fe94",
            measurementId: "G-DTQSMNSG8E"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let map = null;
        let marker = null;
        let unsubscribe = null;

        // Initialize map (default to a central location)
        function initMap(lat = 20, lng = 0) {
            if (map) return;
            map = L.map('map').setView([lat, lng], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors'
            }).addTo(map);
        }

        function startTracking(memberId) {
            // Clean up previous listener
            if (unsubscribe) {
                unsubscribe();
                unsubscribe = null;
            }
            if (marker) {
                marker.remove();
                marker = null;
            }

            const locationRef = doc(db, "liveLocations", memberId);
            unsubscribe = onSnapshot(locationRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const { lat, lng, accuracy, lastUpdated } = data;
                    
                    // Initialize map if not already
                    initMap(lat, lng);
                    
                    // Add or update marker
                    if (marker) {
                        marker.setLatLng([lat, lng]);
                    } else {
                        marker = L.marker([lat, lng]).addTo(map)
                            .bindPopup(`<b>${memberId}</b><br>📍 ${lat.toFixed(6)}, ${lng.toFixed(6)}<br>🎯 Accuracy: ${Math.round(accuracy)}m`)
                            .openPopup();
                    }
                    marker.setPopupContent(`<b>${memberId}</b><br>📍 ${lat.toFixed(6)}, ${lng.toFixed(6)}<br>🎯 Accuracy: ${Math.round(accuracy)}m`);
                    
                    // Center map on marker
                    map.setView([lat, lng], 16);
                    
                    document.getElementById('liveStatus').innerHTML = '🟢 Live: Tracking ' + memberId;
                    document.getElementById('info').innerHTML = `✅ Receiving live updates for <strong>${memberId}</strong>. Accuracy: ${Math.round(accuracy)} meters.`;
                } else {
                    document.getElementById('liveStatus').innerHTML = '🔴 Offline: No location data';
                    document.getElementById('info').innerHTML = `⚠️ No location data for <strong>${memberId}</strong>. Make sure the member is sharing their location.`;
                    if (marker) {
                        marker.remove();
                        marker = null;
                    }
                }
            }, (error) => {
                console.error("Firestore listen error:", error);
                document.getElementById('info').innerHTML = `❌ Error: ${error.message}`;
            });
        }

        document.getElementById('trackBtn').addEventListener('click', () => {
            const memberId = document.getElementById('memberIdInput').value.trim();
            if (memberId) {
                startTracking(memberId);
            } else {
                alert('Please enter a member ID');
            }
        });
    </script>
</body>
</html>
