<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Location</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBLGdFzXkQBu4V9AQeO6R7C4LEo3DgAis",
            authDomain: "chaitanya-ab4ae.firebaseapp.com",
            projectId: "chaitanya-ab4ae",
            storageBucket: "chaitanya-ab4ae.firebasestorage.app",
            messagingSenderId: "571927331069",
            appId: "1:571927331069:web:a256783fa948228363fe94",
            measurementId: "G-DTQSMNSG8E"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const memberId = urlParams.get('member');

        if (!memberId) {
            document.body.innerHTML = '<h3>Error: No member ID. Use ?member=your_id</h3>';
        } else {
            document.getElementById('member-name').innerText = memberId;
            
            let watchId = null;
            let isSharing = false;

            async function startTracking() {
                if (isSharing) return;
                if ("geolocation" in navigator) {
                    // This line triggers the browser's permission popup
                    watchId = navigator.geolocation.watchPosition(
                        async (position) => {
                            const { latitude, longitude, accuracy } = position.coords;
                            const locationRef = doc(db, "liveLocations", memberId);
                            await setDoc(locationRef, {
                                lat: latitude,
                                lng: longitude,
                                accuracy: accuracy,
                                lastUpdated: serverTimestamp(),
                                hidden: false
                            });
                            document.getElementById('status').innerHTML = '✅ Updating location...';
                            document.getElementById('coords').innerHTML = `${latitude.toFixed(6)}, ${longitude.toFixed(6)} (${Math.round(accuracy)}m)`;
                            document.getElementById('stopBtn').disabled = false;
                        },
                        (error) => {
                            let errorMsg = '❌ Error: ';
                            switch(error.code) {
                                case error.PERMISSION_DENIED: errorMsg += 'Permission denied.'; break;
                                case error.POSITION_UNAVAILABLE: errorMsg += 'Unavailable.'; break;
                                case error.TIMEOUT: errorMsg += 'Timeout.'; break;
                                default: errorMsg += 'Unknown error.';
                            }
                            document.getElementById('status').innerHTML = errorMsg;
                        },
                        { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
                    );
                    isSharing = true;
                    document.getElementById('resultBtn').disabled = true;
                    document.getElementById('stopBtn').disabled = false;
                    document.getElementById('status').innerHTML = '📍 Sharing location...';
                } else {
                    document.getElementById('status').innerHTML = '❌ Geolocation not supported.';
                }
            }

            async function stopTracking() {
                if (watchId !== null) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                }
                isSharing = false;
                const locationRef = doc(db, "liveLocations", memberId);
                await deleteDoc(locationRef);
                document.getElementById('status').innerHTML = '🛑 Stopped. Location removed.';
                document.getElementById('coords').innerHTML = '—';
                document.getElementById('resultBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
            }

            // Attach to "Result" button
            document.getElementById('resultBtn').addEventListener('click', startTracking);
            document.getElementById('stopBtn').addEventListener('click', stopTracking);
        }
    </script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        button {
            background: #0d1117;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            margin: 8px;
        }
        button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }
        #resultBtn {
            background: #059669;
        }
        #resultBtn:hover:not(:disabled) {
            background: #047857;
        }
        #stopBtn {
            background: #dc2626;
        }
        #stopBtn:hover:not(:disabled) {
            background: #b91c1c;
        }
        .status {
            background: #eef2ff;
            padding: 12px;
            border-radius: 16px;
            margin: 16px 0;
            font-family: monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="card">
        <p>Member: <strong id="member-name">—</strong></p>
        <button id="resultBtn">📊 Result</button>
        <button id="stopBtn" disabled>⏹️ Stop Sharing</button>
        <div class="status" id="status">Click "Result" to allow location sharing.</div>
        <div class="status" id="coords">—</div>
        <p style="font-size: 12px; color: gray;">Click Result, then Allow location. Keep tab open for live tracking.</p>
    </div>
</body>
</html>
