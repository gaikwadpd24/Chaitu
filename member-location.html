<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Live Location</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyDBLGdFzXkQBu4V9AQeO6R7C4LEo3DgAis",
            authDomain: "chaitanya-ab4ae.firebaseapp.com",
            projectId: "chaitanya-ab4ae",
            storageBucket: "chaitanya-ab4ae.firebasestorage.app",
            messagingSenderId: "571927331069",
            appId: "1:571927331069:web:a256783fa948228363fe94",
            measurementId: "G-DTQSMNSG8E"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Get member ID from URL (?member=alex_chen)
        const urlParams = new URLSearchParams(window.location.search);
        const memberId = urlParams.get('member');

        if (!memberId) {
            document.body.innerHTML = '<h3>Error: No member ID provided. Use ?member=your_id</h3>';
        } else {
            document.getElementById('member-name').innerText = memberId;
            
            let watchId = null;

            function startTracking() {
                if ("geolocation" in navigator) {
                    // Watch position continuously
                    watchId = navigator.geolocation.watchPosition(
                        async (position) => {
                            const { latitude, longitude, accuracy } = position.coords;
                            
                            // Update Firestore document
                            const locationRef = doc(db, "liveLocations", memberId);
                            await setDoc(locationRef, {
                                lat: latitude,
                                lng: longitude,
                                accuracy: accuracy,
                                lastUpdated: serverTimestamp()
                            });
                            
                            document.getElementById('status').innerHTML = '✅ Live: Updating location...';
                            document.getElementById('coords').innerHTML = `${latitude.toFixed(6)}, ${longitude.toFixed(6)} (${Math.round(accuracy)}m accuracy)`;
                        },
                        (error) => {
                            console.error(error);
                            let errorMsg = '❌ Error: ';
                            switch(error.code) {
                                case error.PERMISSION_DENIED: errorMsg += 'Location permission denied.'; break;
                                case error.POSITION_UNAVAILABLE: errorMsg += 'Location unavailable.'; break;
                                case error.TIMEOUT: errorMsg += 'Location request timed out.'; break;
                                default: errorMsg += 'An unknown error occurred.';
                            }
                            document.getElementById('status').innerHTML = errorMsg;
                        },
                        { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
                    );
                } else {
                    document.getElementById('status').innerHTML = '❌ Geolocation not supported.';
                }
            }

            document.getElementById('startBtn').addEventListener('click', startTracking);
        }
    </script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        button {
            background: #0d1117;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            margin: 16px 0;
        }
        .status {
            background: #eef2ff;
            padding: 12px;
            border-radius: 16px;
            margin: 16px 0;
            font-family: monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>📍 Share Live Location</h2>
        <p>Member: <strong id="member-name">—</strong></p>
        <button id="startBtn">▶ Start Sharing Location</button>
        <div class="status" id="status">⏳ Ready. Click start and allow location access.</div>
        <div class="status" id="coords">—</div>
        <p style="font-size: 12px; color: gray;">Keep this tab open for real-time tracking</p>
    </div>
</body>
</html>
